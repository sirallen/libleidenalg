name: Build marketnull wheel

# Builds the self-contained manylinux wheel for the `marketnull` extension
# (libleidenalg + static igraph compiled in) using cibuildwheel, and uploads it
# as a downloadable artifact. ubuntu-latest is x86_64 with Docker preinstalled,
# so the manylinux container build runs natively (matching AWS Glue's arch).
#
# Trigger manually from the Actions tab (workflow_dispatch) or on a release tag.

on:
  workflow_dispatch:
    inputs:
      cibw_build:
        description: "CIBW_BUILD selector (Python/platform). Glue 4.0=cp310, Glue 5.0=cp311."
        required: false
        default: "cp310-manylinux_x86_64 cp311-manylinux_x86_64"
  push:
    tags:
      - "marketnull-v*"

jobs:
  build-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: python -m pip install "cibuildwheel>=2.16"

      - name: Build wheel (cibuildwheel inside manylinux)
        env:
          # Honour the manual input when provided; otherwise build_wheel.sh's default.
          CIBW_BUILD: ${{ github.event.inputs.cibw_build }}
        run: bash marketnull/build_wheel.sh

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: marketnull-wheels
          path: wheelhouse/*.whl
          if-no-files-found: error
